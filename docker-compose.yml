version: '3.8'

# Limites de CPU/memória aplicados via 'deploy.resources' (honrado pelo Docker Compose v2)
# para evitar o efeito "Noisy Neighbor" — cada serviço tem teto e reserva de recursos.

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M

  app-python:
    build: ./app-python
    container_name: app-python
    environment:
      - REDIS_HOST=redis
    ports:
      - "5050:5000"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 256M
        reservations:
          cpus: '0.15'
          memory: 64M

  app-node:
    build: ./app-node
    container_name: app-node
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "3030:3000"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 256M
        reservations:
          cpus: '0.15'
          memory: 64M

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9091:9090"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "4444:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
